name: Backend CI

on:
  push:
    paths:
      - "apps/api/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "apps/api/**"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --workspace=apps/api

      - run: npx --workspace=apps/api prisma generate

      - name: Type check
        run: npx --workspace=apps/api tsc --noEmit

      - name: Tests
        run: npm run test --workspace=apps/api
        env:
          GOCARDLESS_SECRET_ID: ${{ secrets.GOCARDLESS_SECRET_ID }}
          GOCARDLESS_SECRET_KEY: ${{ secrets.GOCARDLESS_SECRET_KEY }}

  build:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Containerfile
          push: true
          tags: |
            ghcr.io/fadykuzman/fin-goals/api:latest
            ghcr.io/fadykuzman/fin-goals/api:${{ github.sha }}
